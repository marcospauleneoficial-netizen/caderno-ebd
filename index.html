<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Caderno de Chamada — EBD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Source+Serif+4:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --ink:#1B2A4A;
  --ink-soft:#2E4066;
  --parchment:#F2E8D5;
  --parchment-dark:#E6D9B8;
  --brass:#B8893E;
  --brass-light:#D4A85E;
  --wine:#7A2E2E;
  --sage:#52684F;
  --paper-line:rgba(27,42,74,0.12);
  --shadow:rgba(27,42,74,0.25);
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--parchment);
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 27px, var(--paper-line) 27px, var(--paper-line) 28px);
  font-family:'Source Serif 4', serif;
  color:var(--ink);
  min-height:100vh;
}
h1,h2,h3,.display{
  font-family:'Playfair Display', serif;
  color:var(--ink);
  margin:0;
}
.mono{ font-family:'IBM Plex Mono', monospace; letter-spacing:0.02em; }

#app{ max-width:980px; margin:0 auto; padding:28px 18px 60px; }

/* ---- Cabeçalho tipo lombada de livro ---- */
.masthead{
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:3px double var(--ink);
  padding-bottom:14px; margin-bottom:22px;
}
.masthead .title-block .eyebrow{
  font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.18em;
  text-transform:uppercase; color:var(--brass); display:block; margin-bottom:4px;
}
.masthead h1{ font-size:30px; }
.userbox{ text-align:right; font-size:13px; }
.userbox .name{ font-weight:600; }
.btn-link{ background:none;border:none;color:var(--wine); font-family:'IBM Plex Mono',monospace; font-size:12px; cursor:pointer; text-decoration:underline; padding:0;}

/* ---- Tabs estilo fichário de catálogo ---- */
.tabs{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:22px; }
.tab{
  background:var(--parchment-dark);
  border:1.5px solid var(--ink);
  border-bottom:none;
  padding:8px 16px 9px;
  font-family:'IBM Plex Mono', monospace;
  font-size:12.5px; letter-spacing:.04em; text-transform:uppercase;
  cursor:pointer; color:var(--ink-soft);
  border-radius:6px 6px 0 0;
  position:relative; top:1px;
}
.tab.active{
  background:var(--ink); color:var(--parchment); border-color:var(--ink);
}

.card{
  background:#fbf6ea;
  border:1.5px solid var(--ink);
  border-radius:3px;
  padding:22px 24px;
  margin-bottom:20px;
  box-shadow:3px 3px 0 var(--shadow);
}
.card h2{ font-size:21px; border-bottom:1px solid var(--paper-line); padding-bottom:8px; margin-bottom:14px;}
.label-tag{
  display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:10.5px;
  text-transform:uppercase; letter-spacing:.12em; color:var(--brass); margin-bottom:6px;
}

input,textarea,select{
  width:100%; padding:9px 10px; border:1.3px solid var(--ink); border-radius:3px;
  background:#fffdf7; font-family:'Source Serif 4', serif; font-size:14.5px; color:var(--ink);
  margin-bottom:12px;
}
textarea{ resize:vertical; min-height:70px; }
label{ font-size:13px; font-weight:600; display:block; margin-bottom:4px; color:var(--ink-soft); }

button.primary{
  background:var(--ink); color:var(--parchment); border:none; padding:10px 20px;
  font-family:'IBM Plex Mono', monospace; font-size:13px; letter-spacing:.05em;
  text-transform:uppercase; border-radius:3px; cursor:pointer;
}
button.primary:hover{ background:var(--ink-soft); }
button.secondary{
  background:transparent; color:var(--ink); border:1.3px solid var(--ink); padding:8px 16px;
  font-family:'IBM Plex Mono', monospace; font-size:12px; text-transform:uppercase; border-radius:3px; cursor:pointer;
}
button.danger{ color:var(--wine); border-color:var(--wine); background:transparent; border:1.3px solid var(--wine); padding:6px 12px; font-family:'IBM Plex Mono',monospace; font-size:11.5px; border-radius:3px; cursor:pointer; }

.verse{
  border-left:4px solid var(--brass); padding:6px 0 6px 16px; font-style:italic; font-size:17px;
}
.verse .ref{ display:block; margin-top:6px; font-style:normal; font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--brass); }

.grid2{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media (max-width:680px){ .grid2{grid-template-columns:1fr;} .masthead{flex-direction:column; align-items:flex-start; gap:8px;} .userbox{text-align:left;} }

table{ width:100%; border-collapse:collapse; font-size:13.5px; }
th,td{ padding:8px 6px; border-bottom:1px solid var(--paper-line); text-align:left; }
th{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--brass); }

.rank-row{ display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--paper-line); }
.rank-num{ font-family:'Playfair Display',serif; font-weight:800; font-size:20px; width:34px; text-align:center; color:var(--ink-soft); }
.rank-row.gold .rank-num{ color:var(--brass); font-size:26px; }
.rank-name{ flex:1; font-weight:600; }
.rank-pts{ font-family:'IBM Plex Mono',monospace; color:var(--sage); font-weight:600; }
.seal{
  display:inline-flex; align-items:center; justify-content:center; width:30px;height:30px;
  border-radius:50%; background:var(--brass); color:#fff; font-family:'Playfair Display',serif; font-weight:700; font-size:14px;
  border:2px solid var(--ink);
}

.pill{ display:inline-block; padding:2px 10px; border-radius:20px; font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase;}
.pill.ok{ background:var(--sage); color:#fff; }
.pill.no{ background:var(--wine); color:#fff; }
.pill.wait{ background:var(--brass); color:#fff; }

.empty{ font-style:italic; color:var(--ink-soft); opacity:.7; font-size:14px; padding:8px 0; }
.msg{ padding:10px 14px; border-radius:3px; font-size:13.5px; margin-bottom:14px; }
.msg.err{ background:#f4dada; color:var(--wine); border:1px solid var(--wine); }
.msg.ok{ background:#e3ead9; color:var(--sage); border:1px solid var(--sage); }

.login-wrap{ max-width:420px; margin:60px auto; }
.login-card{ background:#fbf6ea; border:1.5px solid var(--ink); border-radius:4px; padding:34px 30px; box-shadow:5px 5px 0 var(--shadow); }
.login-card h1{ text-align:center; font-size:26px; margin-bottom:4px; }
.login-card .sub{ text-align:center; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--brass); text-transform:uppercase; letter-spacing:.14em; margin-bottom:24px; }
.switch-mode{ text-align:center; margin-top:14px; font-size:13px; }
.switch-mode a{ color:var(--wine); cursor:pointer; text-decoration:underline; }

.activity-item, .quiz-item, .fb-item{ border:1px solid var(--paper-line); border-radius:3px; padding:14px 16px; margin-bottom:12px; background:#fffef9; }
.activity-item h3, .quiz-item h3{ font-size:16px; margin-bottom:4px; }
.meta{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); opacity:.75; }
.opt-row{ display:flex; align-items:center; gap:8px; padding:5px 0; }
.opt-row input[type=radio]{ width:auto; margin:0; }
.divider{ border:none; border-top:1px dashed var(--paper-line); margin:16px 0; }
fieldset{ border:1px dashed var(--paper-line); border-radius:4px; padding:12px; margin-bottom:14px; }
legend{ font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase; color:var(--brass); }
.row-flex{ display:flex; gap:10px; align-items:center; }
.small{ font-size:12px; opacity:.7; }
.att-grid{ display:grid; grid-template-columns:1fr auto auto; gap:8px; align-items:center; padding:8px 0; border-bottom:1px solid var(--paper-line); }
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, deleteDoc,
  collection, query, where, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVMwvprE6XR_ufKKSs2yEHN-SDSbRu68Y",
  authDomain: "ebdportal-c8a19.firebaseapp.com",
  projectId: "ebdportal-c8a19",
  storageBucket: "ebdportal-c8a19.firebasestorage.app",
  messagingSenderId: "932539800531",
  appId: "1:932539800531:web:e1d0528009f1fbde1ced26",
  measurementId: "G-H9CKF1C9KJ"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const COLLECTION = "ebd_dados";

function docIdFor(key){ return key.replace(/\//g, "_"); }

let CURRENT = null; // {username, ...userData}
let VIEW_MODE = 'login'; // login | cadastro
let ACTIVE_TAB = 'inicio';
let cache = { config:null, users:{}, atividades:{}, questionarios:{}, feedbacks:{}, chamadas:{} };

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let LAST_DB_ERROR = null;
async function sget(key, shared=true){
  try{
    const snap = await getDoc(doc(db, COLLECTION, docIdFor(key)));
    return snap.exists() ? snap.data().value : null;
  }catch(e){ console.error('sget', key, e); LAST_DB_ERROR = e.message || String(e); return null; }
}
async function sset(key, value, shared=true){
  try{
    await setDoc(doc(db, COLLECTION, docIdFor(key)), { key, value });
    return true;
  }catch(e){ console.error('sset', key, e); LAST_DB_ERROR = e.message || String(e); return false; }
}
async function sdel(key, shared=true){
  try{ await deleteDoc(doc(db, COLLECTION, docIdFor(key))); }
  catch(e){ console.error('sdel', key, e); LAST_DB_ERROR = e.message || String(e); }
}
async function slist(prefix, shared=true){
  try{
    const q = query(collection(db, COLLECTION), where('key','>=',prefix), where('key','<', prefix + '\uf8ff'));
    const snaps = await getDocs(q);
    const out = [];
    snaps.forEach(s=> out.push(s.data().key));
    return out;
  }catch(e){ console.error('slist', prefix, e); LAST_DB_ERROR = e.message || String(e); return []; }
}

async function ensureSeed(){
  let cfg = await sget('config');
  if(!cfg){
    cfg = { revista:'Conhecendo as Doutrinas da Bíblia', trimestre:'2º Trimestre de 2026',
      versiculo:'Lâmpada para os meus pés é a tua palavra, e luz para o meu caminho.', versiculoRef:'Salmos 119:105' };
    await sset('config', cfg);
  }
  let prof = await sget('users:professor');
  if(!prof){
    prof = { nome:'Professor', sobrenome:'(Admin)', senha:'ebd2026', isAdmin:true, pontos:0, presencas:[], participacao:{atividades:0,visitantes:0,postura:0,evolucao:0} };
    await sset('users:professor', prof);
  }
}

async function loadAllUsers(){
  const keys = await slist('users:');
  const out = {};
  for(const k of keys){
    const v = await sget(k);
    if(v) out[k.replace('users:','')] = v;
  }
  return out;
}
async function loadAll(prefix){
  const keys = await slist(prefix);
  const out = {};
  for(const k of keys){ const v = await sget(k); if(v) out[k] = v; }
  return out;
}

function genUsername(nome, sobrenome, existing){
  let base = (nome.trim() + sobrenome.trim()).toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z]/g,'');
  let u = base, i=1;
  while(existing[u]){ u = base + i; i++; }
  return u;
}

/* ---------------- RENDER ROOT ---------------- */
async function render(){
  const app = document.getElementById('app');
  if(!CURRENT){ app.innerHTML = await renderLogin(); attachLoginEvents(); return; }
  cache.config = await sget('config');
  cache.users = await loadAllUsers();
  cache.atividades = await loadAll('atividades:');
  cache.questionarios = await loadAll('quiz:');
  cache.feedbacks = await loadAll('feedback:');
  cache.chamadas = await loadAll('chamada:');

  const isAdmin = CURRENT.isAdmin;
  app.innerHTML = `
    <div class="masthead">
      <div class="title-block">
        <span class="eyebrow">Escola Bíblica Dominical</span>
        <h1>Caderno de Chamada</h1>
      </div>
      <div class="userbox">
        <div class="name">${esc(CURRENT.nome)} ${esc(CURRENT.sobrenome)}</div>
        <div class="small mono">${isAdmin? 'PROFESSOR' : '@'+CURRENT.username}</div>
        <button class="btn-link" id="logoutBtn">sair</button>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div id="tabContent"></div>
  `;
  document.getElementById('logoutBtn').onclick = ()=>{ CURRENT=null; ACTIVE_TAB='inicio'; render(); };

  const tabsDef = isAdmin
    ? [['inicio','Início'],['atividades','Atividades'],['questionarios','Questionários'],['chamada','Chamada'],['alunos','Alunos'],['feedbacks','Feedbacks']]
    : [['inicio','Início'],['atividades','Atividades'],['questionarios','Questionários'],['ranking','Ranking'],['feedback','Feedback'],['perfil','Perfil']];

  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = tabsDef.map(([k,l])=>`<div class="tab ${ACTIVE_TAB===k?'active':''}" data-tab="${k}">${l}</div>`).join('');
  tabsEl.querySelectorAll('.tab').forEach(t=> t.onclick = ()=>{ ACTIVE_TAB = t.dataset.tab; render(); });

  const content = document.getElementById('tabContent');
  if(isAdmin){
    if(ACTIVE_TAB==='inicio') content.innerHTML = await renderAdminInicio();
    if(ACTIVE_TAB==='atividades') content.innerHTML = await renderAdminAtividades();
    if(ACTIVE_TAB==='questionarios') content.innerHTML = await renderAdminQuiz();
    if(ACTIVE_TAB==='chamada') content.innerHTML = await renderAdminChamada();
    if(ACTIVE_TAB==='alunos') content.innerHTML = await renderAdminAlunos();
    if(ACTIVE_TAB==='feedbacks') content.innerHTML = await renderAdminFeedbacks();
  } else {
    if(ACTIVE_TAB==='inicio') content.innerHTML = await renderAlunoInicio();
    if(ACTIVE_TAB==='atividades') content.innerHTML = await renderAlunoAtividades();
    if(ACTIVE_TAB==='questionarios') content.innerHTML = await renderAlunoQuiz();
    if(ACTIVE_TAB==='ranking') content.innerHTML = await renderRanking();
    if(ACTIVE_TAB==='feedback') content.innerHTML = await renderAlunoFeedback();
    if(ACTIVE_TAB==='perfil') content.innerHTML = await renderPerfil();
  }
  attachTabEvents();
}

/* ---------------- LOGIN / CADASTRO ---------------- */
async function renderLogin(){
  LAST_DB_ERROR = null;
  await ensureSeed();
  const dbWarning = LAST_DB_ERROR
    ? `<div class="msg err">Não foi possível conectar ao banco de dados (Firestore). Erro: <span class="mono">${esc(LAST_DB_ERROR)}</span><br>Verifique se o Firestore Database foi criado no projeto e se as regras de segurança permitem leitura/escrita na coleção <b>ebd_dados</b>.</div>`
    : '';
  if(VIEW_MODE==='cadastro'){
    return `
    <div class="login-wrap">
      <div class="login-card">
        <h1>Novo Aluno</h1>
        <div class="sub">Cadastro · Escola Bíblica Dominical</div>
        ${dbWarning}
        <div id="loginMsg"></div>
        <label>Nome</label>
        <input id="cNome" placeholder="Seu nome">
        <label>Sobrenome</label>
        <input id="cSobrenome" placeholder="Seu sobrenome">
        <label>Senha padrão</label>
        <input id="cSenha" type="password" value="123456" disabled>
        <p class="small">Seu usuário será seu nome+sobrenome (ex: joaosilva) e sua senha inicial é <b>123456</b>. Você poderá trocar a senha depois em "Perfil".</p>
        <button class="primary" id="doCadastro" style="width:100%; margin-top:6px;">Cadastrar</button>
        <div class="switch-mode">Já tem cadastro? <a id="goLogin">Entrar</a></div>
      </div>
    </div>`;
  }
  return `
  <div class="login-wrap">
    <div class="login-card">
      <h1>Caderno de Chamada</h1>
      <div class="sub">Escola Bíblica Dominical</div>
      ${dbWarning}
      <div id="loginMsg"></div>
      <label>Usuário</label>
      <input id="lUser" placeholder="seu.usuario ou professor">
      <label>Senha</label>
      <input id="lSenha" type="password" placeholder="senha">
      <button class="primary" id="doLogin" style="width:100%; margin-top:6px;">Entrar</button>
      <div class="switch-mode">Ainda não tem cadastro? <a id="goCadastro">Cadastre-se</a></div>
    </div>
  </div>`;
}

function attachLoginEvents(){
  const msg = (t,type='err')=>{ const m=document.getElementById('loginMsg'); m.innerHTML = `<div class="msg ${type}">${t}</div>`; };
  const goCad = document.getElementById('goCadastro');
  if(goCad) goCad.onclick = ()=>{ VIEW_MODE='cadastro'; render(); };
  const goLog = document.getElementById('goLogin');
  if(goLog) goLog.onclick = ()=>{ VIEW_MODE='login'; render(); };

  const doLogin = document.getElementById('doLogin');
  if(doLogin) doLogin.onclick = async ()=>{
    const u = document.getElementById('lUser').value.trim().toLowerCase();
    const p = document.getElementById('lSenha').value;
    if(!u || !p){ msg('Preencha usuário e senha.'); return; }
    LAST_DB_ERROR = null;
    const data = await sget('users:'+u);
    if(LAST_DB_ERROR){ msg('Erro de conexão com o banco de dados: ' + esc(LAST_DB_ERROR)); return; }
    if(!data || data.senha !== p){ msg('Usuário ou senha incorretos.'); return; }
    CURRENT = { username:u, ...data };
    ACTIVE_TAB='inicio';
    render();
  };

  const doCad = document.getElementById('doCadastro');
  if(doCad) doCad.onclick = async ()=>{
    const nome = document.getElementById('cNome').value.trim();
    const sobrenome = document.getElementById('cSobrenome').value.trim();
    if(!nome || !sobrenome){ msg('Preencha nome e sobrenome.'); return; }
    const existing = await loadAllUsers();
    const username = genUsername(nome, sobrenome, existing);
    const novo = { nome, sobrenome, senha:'123456', isAdmin:false, pontos:0, presencas:[], participacao:{atividades:0,visitantes:0,postura:0,evolucao:0} };
    await sset('users:'+username, novo);
    msg(`Cadastro feito! Seu usuário é <b>${esc(username)}</b> — guarde-o. Senha padrão: 123456.`, 'ok');
    setTimeout(()=>{ VIEW_MODE='login'; render(); }, 2600);
  };
}

/* ---------------- ALUNO: INÍCIO ---------------- */
async function renderAlunoInicio(){
  const c = cache.config;
  const presCount = (CURRENT.presencas||[]).filter(Boolean).length;
  return `
  <div class="grid2">
    <div class="card">
      <span class="label-tag">Revista em estudo</span>
      <h2>${esc(c.revista)}</h2>
      <p class="meta">${esc(c.trimestre)}</p>
    </div>
    <div class="card">
      <span class="label-tag">Versículo do dia</span>
      <div class="verse">"${esc(c.versiculo)}"<span class="ref">${esc(c.versiculoRef)}</span></div>
    </div>
  </div>
  <div class="grid2">
    <div class="card">
      <span class="label-tag">Sua pontuação</span>
      <h2 class="mono" style="color:var(--sage); font-size:30px;">${CURRENT.pontos||0} pts</h2>
      <p class="meta">${presCount} presença(s) registrada(s)</p>
    </div>
    <div class="card">
      <span class="label-tag">Participação avaliada pelo professor</span>
      <table>
        <tr><td>Atividades feitas</td><td class="mono">${CURRENT.participacao?.atividades||0}/5</td></tr>
        <tr><td>Visitantes trazidos</td><td class="mono">${CURRENT.participacao?.visitantes||0}</td></tr>
        <tr><td>Postura</td><td class="mono">${CURRENT.participacao?.postura||0}/5</td></tr>
        <tr><td>Evolução ministerial</td><td class="mono">${CURRENT.participacao?.evolucao||0}/5</td></tr>
      </table>
    </div>
  </div>`;
}

/* ---------------- ALUNO: ATIVIDADES ---------------- */
async function renderAlunoAtividades(){
  const acts = Object.values(cache.atividades).sort((a,b)=> (b.data||'').localeCompare(a.data||''));
  if(!acts.length) return `<div class="card"><h2>Atividades</h2><p class="empty">Nenhuma atividade proposta ainda.</p></div>`;
  return `<div class="card"><h2>Atividades propostas</h2>
    ${acts.map(a=>`
      <div class="activity-item">
        <h3>${esc(a.titulo)}</h3>
        <p class="meta">${esc(a.data||'')}</p>
        <p>${esc(a.descricao)}</p>
      </div>`).join('')}
  </div>`;
}

/* ---------------- ALUNO: QUESTIONÁRIOS ---------------- */
async function renderAlunoQuiz(){
  const quizzes = Object.entries(cache.questionarios);
  if(!quizzes.length) return `<div class="card"><h2>Questionários</h2><p class="empty">Nenhum questionário disponível.</p></div>`;
  let html = `<div class="card"><h2>Questionários</h2>`;
  for(const [key, q] of quizzes){
    const id = key.replace('quiz:','');
    const resp = await sget('resposta:'+id+':'+CURRENT.username);
    html += `<div class="quiz-item">
      <h3>${esc(q.titulo)}</h3>
      <p class="meta">${q.perguntas.length} pergunta(s)</p>
      ${resp
        ? `<p class="pill ok">Respondido — nota ${resp.nota}/${q.perguntas.length}</p>`
        : `<form data-quiz="${id}" class="quizForm">
            ${q.perguntas.map((p,i)=>`
              <div class="divider"></div>
              <p><b>${i+1}. ${esc(p.texto)}</b></p>
              ${p.opcoes.map((op,oi)=>`
                <div class="opt-row">
                  <input type="radio" name="q${id}_${i}" value="${oi}" id="q${id}_${i}_${oi}" required>
                  <label style="margin:0;font-weight:400" for="q${id}_${i}_${oi}">${esc(op)}</label>
                </div>`).join('')}
            `).join('')}
            <button class="primary" type="submit" style="margin-top:10px;">Enviar respostas</button>
          </form>`}
    </div>`;
  }
  html += `</div>`;
  return html;
}

/* ---------------- RANKING ---------------- */
async function renderRanking(){
  const alunos = Object.entries(cache.users).filter(([u,d])=>!d.isAdmin)

    .sort((a,b)=> (b.pontos||0)-(a.pontos||0));
  if(!alunos.length) return `<div class="card"><h2>Ranking</h2><p class="empty">Ainda não há alunos cadastrados.</p></div>`;
  return `<div class="card"><h2>Ranking de pontuação</h2>
    ${alunos.map((a,i)=>`
      <div class="rank-row ${i===0?'gold':''}">
        ${i===0 ? `<span class="seal">1º</span>` : `<span class="rank-num">${i+1}</span>`}
        <span class="rank-name">${esc(a.nome)} ${esc(a.sobrenome)} ${a.username===CURRENT.username?'<span class="pill wait">você</span>':''}</span>
        <span class="rank-pts">${a.pontos||0} pts</span>
      </div>`).join('')}
  </div>`;
}

/* ---------------- ADMIN: QUESTIONÁRIOS ---------------- */
let QUIZ_DRAFT = [{texto:'', opcoes:['',''], correta:0}];
async function renderAdminQuiz(){
  const quizzes = Object.entries(cache.questionarios);
  let html = `<div class="card">
    <h2>Criar questionário</h2>
    <label>Título do questionário</label>
    <input id="quizTitulo" placeholder="Ex: Quiz da aula sobre Gênesis">
    <div id="quizPerguntas"></div>
    <button class="secondary" id="addPergunta" type="button">+ Adicionar pergunta</button>
    <div class="divider"></div>
    <button class="primary" id="salvarQuiz">Salvar questionário</button>
    <div id="quizMsg"></div>
  </div>
  <div class="card"><h2>Questionários e respostas</h2>`;
  if(!quizzes.length) html += `<p class="empty">Nenhum questionário criado ainda.</p>`;
  for(const [key,q] of quizzes){
    const id = key.replace('quiz:','');
    const respKeys = await slist('resposta:'+id+':');
    html += `<div class="quiz-item">
      <div class="row-flex" style="justify-content:space-between;">
        <h3>${esc(q.titulo)}</h3>
        <button class="danger" data-del-quiz="${key}">Remover</button>
      </div>
      <p class="meta">${q.perguntas.length} pergunta(s) · ${respKeys.length} resposta(s) recebida(s)</p>
      <table><tr><th>Aluno</th><th>Nota</th></tr>
      ${(await Promise.all(respKeys.map(async rk=>{
          const username = rk.split(':').slice(2).join(':');
          const r = await sget(rk);
          const u = cache.users[username];
          return `<tr><td>${u? esc(u.nome+' '+u.sobrenome) : esc(username)}</td><td class="mono">${r.nota}/${q.perguntas.length}</td></tr>`;
      }))).join('') || `<tr><td colspan="2" class="empty">Sem respostas ainda</td></tr>`}
      </table>
    </div>`;
  }
  html += `</div>`;
  return html;
}
function renderQuizDraftForm(){
  const wrap = document.getElementById('quizPerguntas');
  if(!wrap) return;
  wrap.innerHTML = QUIZ_DRAFT.map((p,i)=>`
    <fieldset>
      <legend>Pergunta ${i+1}</legend>
      <input class="qd-texto" data-i="${i}" placeholder="Texto da pergunta" value="${esc(p.texto)}">
      ${p.opcoes.map((op,oi)=>`
        <div class="row-flex">
          <input type="radio" name="correta${i}" ${p.correta===oi?'checked':''} class="qd-correta" data-i="${i}" data-oi="${oi}" style="width:auto;">
          <input class="qd-opcao" data-i="${i}" data-oi="${oi}" placeholder="Opção ${oi+1}" value="${esc(op)}" style="margin-bottom:0;">
        </div>`).join('')}
      <button type="button" class="secondary" data-addopt="${i}" style="margin-top:6px;">+ opção</button>
    </fieldset>
  `).join('');
  wrap.querySelectorAll('.qd-texto').forEach(el=> el.oninput = e=>{ QUIZ_DRAFT[e.target.dataset.i].texto = e.target.value; });
  wrap.querySelectorAll('.qd-opcao').forEach(el=> el.oninput = e=>{ QUIZ_DRAFT[e.target.dataset.i].opcoes[e.target.dataset.oi] = e.target.value; });
  wrap.querySelectorAll('.qd-correta').forEach(el=> el.onchange = e=>{ QUIZ_DRAFT[e.target.dataset.i].correta = Number(e.target.dataset.oi); });
  wrap.querySelectorAll('[data-addopt]').forEach(btn=> btn.onclick = ()=>{ QUIZ_DRAFT[btn.dataset.addopt].opcoes.push(''); renderQuizDraftForm(); });
}

/* ---------------- EVENTOS POR ABA ---------------- */
function attachTabEvents(){
  // ALUNO eventos
  document.querySelectorAll('.quizForm').forEach(form=>{
    form.onsubmit = async (e)=>{
      e.preventDefault();
      const id = form.dataset.quiz;
      const q = cache.questionarios['quiz:'+id];
      let acertos = 0;
      const respostas = [];
      q.perguntas.forEach((p,i)=>{
        const val = Number(form.querySelector(`input[name="q${id}_${i}"]:checked`).value);
        respostas.push(val);
        if(val === p.correta) acertos++;
      });
      await sset('resposta:'+id+':'+CURRENT.username, { nota: acertos, respostas, data:new Date().toISOString().slice(0,10) });
      const novosPontos = (CURRENT.pontos||0) + acertos*5;
      CURRENT.pontos = novosPontos;
      const u = await sget('users:'+CURRENT.username);
      u.pontos = novosPontos;
      await sset('users:'+CURRENT.username, u);
      render();
    };
  });

  const sendFb = document.getElementById('sendFb');
  if(sendFb) sendFb.onclick = async ()=>{
    const txt = document.getElementById('fbText').value.trim();
    const m = document.getElementById('fbMsg');
    if(!txt){ m.innerHTML = `<div class="msg err">Escreva algo antes de enviar.</div>`; return; }
    await sset('feedback:'+uid(), { username:CURRENT.username, nome:CURRENT.nome+' '+CURRENT.sobrenome, texto:txt, data:new Date().toISOString().slice(0,10) });
    m.innerHTML = `<div class="msg ok">Feedback enviado ao professor. Obrigado!</div>`;
    document.getElementById('fbText').value='';
  };

  const trocarSenha = document.getElementById('trocarSenha');
  if(trocarSenha) trocarSenha.onclick = async ()=>{
    const nova = document.getElementById('novaSenha').value;
    const m = document.getElementById('perfilMsg');
    if(!nova || nova.length<4){ m.innerHTML = `<div class="msg err">A senha deve ter ao menos 4 caracteres.</div>`; return; }
    const u = await sget('users:'+CURRENT.username);
    u.senha = nova;
    await sset('users:'+CURRENT.username, u);
    CURRENT.senha = nova;
    m.innerHTML = `<div class="msg ok">Senha atualizada com sucesso!</div>`;
  };

  // ADMIN eventos
  const salvarCfg = document.getElementById('salvarCfg');
  if(salvarCfg) salvarCfg.onclick = async ()=>{
    const cfg = {
      revista: document.getElementById('cfgRevista').value,
      trimestre: document.getElementById('cfgTrimestre').value,
      versiculo: document.getElementById('cfgVersiculo').value,
      versiculoRef: document.getElementById('cfgRef').value,
    };
    await sset('config', cfg);
    document.getElementById('cfgMsg').innerHTML = `<div class="msg ok">Configuração salva.</div>`;
  };

  const addAtividade = document.getElementById('addAtividade');
  if(addAtividade) addAtividade.onclick = async ()=>{
    const titulo = document.getElementById('atTitulo').value.trim();
    const data = document.getElementById('atData').value;
    const descricao = document.getElementById('atDesc').value.trim();
    if(!titulo){ return; }
    await sset('atividades:'+uid(), { titulo, data, descricao });
    render();
  };
  document.querySelectorAll('[data-del-act]').forEach(b=> b.onclick = async ()=>{ await sdel(b.dataset.delAct); render(); });

  const addPergunta = document.getElementById('addPergunta');
  if(addPergunta){ renderQuizDraftForm(); addPergunta.onclick = ()=>{ QUIZ_DRAFT.push({texto:'',opcoes:['',''],correta:0}); renderQuizDraftForm(); }; }
  const salvarQuiz = document.getElementById('salvarQuiz');
  if(salvarQuiz) salvarQuiz.onclick = async ()=>{
    const titulo = document.getElementById('quizTitulo').value.trim();
    const m = document.getElementById('quizMsg');
    if(!titulo || !QUIZ_DRAFT.every(p=>p.texto && p.opcoes.every(o=>o))){
      m.innerHTML = `<div class="msg err">Preencha o título, perguntas e todas as opções.</div>`; return;
    }
    await sset('quiz:'+uid(), { titulo, perguntas: QUIZ_DRAFT.map(p=>({...p})) });
    QUIZ_DRAFT = [{texto:'',opcoes:['',''],correta:0}];
    render();
  };
  document.querySelectorAll('[data-del-quiz]').forEach(b=> b.onclick = async ()=>{ await sdel(b.dataset.delQuiz); render(); });

  const salvarChamada = document.getElementById('salvarChamada');
  if(salvarChamada) salvarChamada.onclick = async ()=>{
    const data = document.getElementById('chamadaData').value;
    if(!data) return;
    const reg = {};
    for(const [u,d] of Object.entries(cache.users)){
      if(d.isAdmin) continue;
      const sel = document.querySelector(`input[name="att_${u}"]:checked`);
      const presente = sel ? sel.value==='presente' : false;
      reg[u] = presente;
      if(presente){
        const usr = await sget('users:'+u);
        usr.presencas = usr.presencas||[];
        usr.presencas.push(data);
        usr.pontos = (usr.pontos||0) + 10;
        await sset('users:'+u, usr);
      }
    }
    await sset('chamada:'+data, reg);
    document.getElementById('chamadaMsg').innerHTML = `<div class="msg ok">Chamada salva!</div>`;
    render();
  };

  document.querySelectorAll('[data-save-part]').forEach(btn=> btn.onclick = async ()=>{
    const username = btn.dataset.savePart;
    const fields = document.querySelectorAll(`.part-input[data-user="${username}"]`);
    const u = await sget('users:'+username);
    let bonus = 0;
    fields.forEach(f=>{ const val = Number(f.value)||0; bonus += val; u.participacao[f.dataset.field] = val; });
    u.pontos = (u.pontos||0); // pontos base mantidos, participação soma como bônus visível só na ficha
    await sset('users:'+username, u);
    render();
  });
  document.querySelectorAll('[data-del-user]').forEach(btn=> btn.onclick = async ()=>{
    if(confirm('Remover este aluno do sistema?')){ await sdel('users:'+btn.dataset.delUser); render(); }
  });
}

render();
</script>
